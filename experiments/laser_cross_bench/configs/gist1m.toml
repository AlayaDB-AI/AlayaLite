# GIST-1M LASER cross-benchmark config.
#
# Drives every step (step1..step5 + plot_*) without source edits.
# Copy this file as a template for new datasets:
#   cp gist1m.toml sift1m.toml   # then edit paths/dataset/build to taste
#
# The bench produces one CSV per (laser, vamana_tag) cell under
# `<tmp_dir>/results/{orig,lite}_<tag>.csv`. Plots auto-discover them.

name = "gist1m"

[paths]
# Where the dataset .fbin / .ibin files live.
data_dir = "/md1/huangliang/alaya-dev/data/gist1m"
# Scratch directory for build artifacts and result CSVs.
tmp_dir = "/md1/huangliang/alaya-dev/tmp/laser_cross_bench"
# Optional: path to the upstream Laser repo's Python interpreter (only required by step3).
laser_venv = "/md1/huangliang/alaya-dev/Laser/.venv/bin/python"
# Optional: DiskANN's `build_memory_index` binary (only required by step1).
diskann_binary = "/md1/huangliang/alaya-dev/Laser/DiskANN/build/apps/build_memory_index"

[dataset]
# Conventional file naming: <prefix>_base.fbin / <prefix>_query.fbin / <prefix>_gt.ibin.
# Override base_filename / query_filename / gt_filename to break the convention.
prefix = "gist"

[build]
# Mirrors `alayalite.laser.BuildParams`. Used for both orig and lite cells.
R = 64
main_dim = 256
L = 100
alpha = 1.2
ef_indexing = 200
ep_num = 300

# Each entry produces one Vamana graph artifact and feeds two cells (orig + lite).
[[vamana_sources]]
tag = "diskann"
builder = "diskann"
L = 200

[[vamana_sources]]
tag = "alayalite_l100"
builder = "alayalite"
L = 100

[[vamana_sources]]
tag = "alayalite_l200"
builder = "alayalite"
L = 200

[bench]
k = 10
beam = 16
warmup = 10
runs = 30
ef_sweep = [80, 90, 100, 110, 130, 150, 200, 250, 300, 400, 500]
build_threads = 48
search_threads = 1
numactl = true
seed = 42
dram_budget_gb = 1.0
