---
name: Codecov
on  :
  workflow_dispatch:
  pull_request:
    paths:
    - include/**
    - tests/**
    - python/src/**
    - python/tests/**
    - app/**
    - app/tests/**
    - CMakeLists.txt
    - Makefile
    - pyproject.toml
    - python/CMakeLists.txt
    - cmake/**
    - scripts/ci/codecov/**
    - scripts/conan_build/**
  push:
    branches: [main]
    paths:
    - include/**
    - tests/**
    - python/src/**
    - python/tests/**
    - app/**
    - app/tests/**
    - CMakeLists.txt
    - Makefile
    - pyproject.toml
    - python/CMakeLists.txt
    - cmake/**
    - scripts/ci/codecov/**
    - scripts/conan_build/**

jobs:
  codecov:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BUILD_JOBS: 2
      CTEST_JOBS: 1
      OMP_NUM_THREADS: 2
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Restore Caches
      uses: ./.github/actions/cache-restore
      with:
        build-type: Debug

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install dependencies
      run: pip install pytest pytest-cov conan && sudo apt-get install -y lcov

    - name: Run python code coverage
      run: |
        uv sync --dev
        uv run pytest --cov --cov-branch --cov-report=xml

    - name: Run c++ code coverage
      run: bash scripts/ci/codecov/gnu_codecoverage.sh

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: |
          coverage.xml
          coverage_c++.info
        token: ${{ secrets.CODECOV_TOKEN }}
