# Tier A daily gate — port (alayaP) side.
# Paired with Laser/reproduce/configs/synth_20k_768d_origP.toml.
# Drives examples/laser/main.py under the Tier A invariant triple (D4):
#   OMP_NUM_THREADS=1 (env)  AND  force_single_thread=true  AND  build_threads=1
# At these settings the port and upstream pipelines SHOULD emit SHA-256-equal
# dsqg_synth_20k_768d_{pca.bin,medoids,medoids_indices,rotator_signs.bin,index}
# (subject to the D9 PCA demotion path for NumPy/sklearn version skew).

pca_seed = 42
medoid_seed = 42
rotator_seed = 42
force_single_thread = true
build_threads = 1
dump_rotator = true

[dataset]
name = "synth_20k_768d"
metric = "l2"
degree = 64
main_dimension = 256

[paths]
base = "/md1/huangliang/alaya-dev/data/synth_20k_768d/base.fbin"
query = "/md1/huangliang/alaya-dev/data/synth_20k_768d/query.fbin"
gt = "/md1/huangliang/alaya-dev/data/synth_20k_768d/gt.ibin"
# Vamana graph input — must be byte-identical across port and upstream runs.
# AlayaLite-side Vamana at R64_L100_a1.2 is the canonical Tier A input.
vamana = "/md1/huangliang/alaya-dev/build_graph/synth_20k_768d/alaya/R64_L100_a1.2/graph.index"
# Default output; the Tier A harness overrides this per-side at invoke time.
output = "/md1/huangliang/alaya-dev/build_graph/synth_20k_768d/laser_port_alayaP"

[build_vamana]
L = 100
alpha = 1.2
seed = 1234
num_threads = 1
dram_budget_gb = 1.0

[build]
ef_indexing = 200

[search]
topk = 10
threads = 1
beam_width = 16
dram_budget = 1.0
ep_num = 300
warmup = 2
runs = 3
efs = [30, 40, 50, 60, 80, 100, 130, 170, 220, 300, 400, 500]
