# Synthetic 100K × 512d dataset (see scripts/gen_synth_100k_512d.py).
# AlayaV-built Vamana input. Vamana path is the paper-default R=64 L=100 α=1.2.

[dataset]
name = "synth_100k_512d"
metric = "l2"
degree = 64
main_dimension = 256

[paths]
base   = "/md1/huangliang/alaya-dev/data/synth_100k_512d/base.fbin"
query  = "/md1/huangliang/alaya-dev/data/synth_100k_512d/query.fbin"
gt     = "/md1/huangliang/alaya-dev/data/synth_100k_512d/gt.ibin"
vamana = "/md1/huangliang/alaya-dev/build_graph/synth_100k_512d/alaya/R64_L100_a1.2/graph.index"
output = "/md1/huangliang/alaya-dev/build_graph/synth_100k_512d/laser_port"

[build]
build_threads = 48
ef_indexing = 200

[search]
topk = 10
threads = 1
beam_width = 16
dram_budget = 1.0
ep_num = 300
warmup = 10
runs = 30
efs = [80, 90, 100, 110, 130, 150, 200, 250, 300, 400, 500]
