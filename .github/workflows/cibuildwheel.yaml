---
name: Build Wheels

on  :
  workflow_dispatch:
  push:
    branches: [test/ci]
  #   tags:
  #     - 'v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: ubuntu-latest
          #   arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64

    env:
      CONAN_NON_INTERACTIVE: 1
      CIBW_CONTAINER_ENGINE: "docker; create_args: -v /home/runner/.conan2:/root/.conan2"
      CIBW_ARCHS_LINUX: ${{ matrix.arch }}

    steps:
    - uses: actions/checkout@v4

    - name: Restore Conan cache
      uses: ./.github/actions/cache-restore

    # - name: Cache Docker images
    #   uses: ScribeMD/docker-cache@0.5.0
    #   with:
    #     key: docker-cibuildwheel-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('.github/workflows/cibuildwheel.yaml', 'pyproject.toml')}}

    - name: Build wheels
      uses: pypa/cibuildwheel@v2.16.5

    - uses: actions/upload-artifact@v4
      with:
        name: cibw-wheels-${{ matrix.os }}-${{ matrix.arch }}
        path: ./wheelhouse/*.whl

