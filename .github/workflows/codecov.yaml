---
name: Codecov
on  :
  workflow_dispatch:
  pull_request:
    paths:
    - include/**
    - tests/**
    - python/src/**
    - python/tests/**
    - app/**
    - app/tests/**
    - CMakeLists.txt
    - Makefile
    - pyproject.toml
    - python/CMakeLists.txt
    - cmake/**
    - scripts/ci/codecov/**
    - scripts/conan_build/**
  push:
    branches: [main]
    paths:
    - include/**
    - tests/**
    - python/src/**
    - python/tests/**
    - app/**
    - app/tests/**
    - CMakeLists.txt
    - Makefile
    - pyproject.toml
    - python/CMakeLists.txt
    - cmake/**
    - scripts/ci/codecov/**
    - scripts/conan_build/**

jobs:
  codecov-python:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Restore Conan cache
      id: conan-cache
      uses: ./.github/actions/cache-restore
      with:
        build-type: Release
        target-arch: ${{ runner.arch }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Restore compiler cache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: >-
          codecov-python-portable-v2-${{ runner.os }}-${{ runner.arch }}-Release-${{ hashFiles('CMakeLists.txt',
          'python/CMakeLists.txt', 'conanfile.py', 'scripts/conan_build/conan_install.py',
          'scripts/conan_build/conan_profile*', 'cmake/**/*.cmake') }}
        restore-keys: |
          codecov-python-portable-v2-${{ runner.os }}-${{ runner.arch }}-Release-

    - name: Install system dependencies
      run: sudo apt-get install -y gdb libaio-dev

    - name: Build Python coverage environment
      run: |
        export CMAKE_ARGS="-DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DALAYA_NATIVE_ARCH=OFF"
        export CXXFLAGS="${CXXFLAGS:-} -g1 -fno-omit-frame-pointer"
        uv sync --dev --locked -Cinstall.strip=false

    - name: Save Conan cache
      if: steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/cache-restore
      with:
        mode: save
        build-type: Release
        target-arch: ${{ runner.arch }}

    - name: Run python code coverage
      env:
        PYTHONFAULTHANDLER: '1'
      run: |
        set -o pipefail

        python_bin=".venv/bin/python"
        ulimit -c unlimited
        sudo sysctl -w "kernel.core_pattern=${PWD}/core.%e.%p" || true

        set +e
        "$python_bin" -X faulthandler -m pytest --cov --cov-branch --cov-report=xml 2>&1 | tee pytest-crash.log
        status=${PIPESTATUS[0]}
        set -e

        if [ "$status" -ne 0 ]; then
          echo "::group::Python environment"
          "$python_bin" --version || true
          "$python_bin" -c "import platform, sys; print(sys.executable); print(sys.version); print(platform.platform())" || true
          "$python_bin" -c "import alayalite, alayalite._alayalitepy as m; print(alayalite.__file__); print(m.__file__)" || true
          echo "::endgroup::"

          if [ "$status" -eq 139 ] || [ "$status" -eq 134 ]; then
            echo "::group::Native crash backtrace"
            shopt -s nullglob
            cores=(core.*)
            if [ "${#cores[@]}" -gt 0 ]; then
              ls -lh "${cores[@]}" || true
              for core in "${cores[@]}"; do
                echo "Backtrace for ${core}"
                gdb -q -batch \
                  -ex "set pagination off" \
                  -ex "set print thread-events off" \
                  -ex "thread apply all bt full" \
                  -ex "info sharedlibrary" \
                  "$python_bin" "$core" || true
              done
            else
              echo "No core file was produced; rerunning under gdb for an immediate native backtrace."
              gdb -q -batch \
                -ex "set pagination off" \
                -ex "set print thread-events off" \
                -ex "run" \
                -ex "thread apply all bt full" \
                -ex "info sharedlibrary" \
                --args "$python_bin" -X faulthandler -m pytest --cov --cov-branch --cov-report=xml || true
            fi
            echo "::endgroup::"
          fi
        fi

        exit "$status"

    - name: Upload Python crash diagnostics
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: python-crash-diagnostics
        path: |
          core.*
          pytest-crash.log
          coverage.xml
          .venv/lib/python*/site-packages/alayalite/_alayalitepy*.so
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload Python coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: coverage.xml
        flags: python
        token: ${{ secrets.CODECOV_TOKEN }}

  codecov-cpp:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BUILD_JOBS: 2
      CTEST_JOBS: 1
      CTEST_LABELS: unit|storage|recovery|simd|space|utils
      OMP_NUM_THREADS: 1
      ALAYA_MAX_THREADS: 1
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Restore Conan cache
      id: conan-cache
      uses: ./.github/actions/cache-restore
      with:
        build-type: Debug
        target-arch: ${{ runner.arch }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Restore compiler cache
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: >-
          codecov-cpp-portable-v2-${{ runner.os }}-${{ runner.arch }}-Debug-${{ hashFiles('CMakeLists.txt',
          'tests/CMakeLists.txt', 'conanfile.py', 'scripts/conan_build/conan_install.py',
          'scripts/conan_build/conan_profile*', 'cmake/**/*.cmake', 'scripts/ci/codecov/gnu_codecoverage.sh') }}
        restore-keys: |
          codecov-cpp-portable-v2-${{ runner.os }}-${{ runner.arch }}-Debug-

    - name: Install system dependencies
      run: sudo apt-get install -y lcov libaio-dev

    - name: Run c++ code coverage
      run: CMAKE_CXX_COMPILER_LAUNCHER=ccache bash scripts/ci/codecov/gnu_codecoverage.sh

    - name: Save Conan cache
      if: steps.conan-cache.outputs.cache-hit != 'true'
      continue-on-error: true
      uses: ./.github/actions/cache-restore
      with:
        mode: save
        build-type: Debug
        target-arch: ${{ runner.arch }}

    - name: Upload C++ coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: coverage_c++.info
        flags: cpp
        token: ${{ secrets.CODECOV_TOKEN }}
